<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="seedGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d9e73"/>
      <stop offset="100%" style="stop-color:#1a7a56"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="200" rx="16" fill="#f8f9fa"/>
  <rect width="720" height="200" rx="16" fill="none" stroke="#e2e5e9" stroke-width="1"/>
  
  <!-- Subtle grid dots -->
  <g opacity="0.1">
    <circle cx="40" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="80" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="120" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="160" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="200" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="40" cy="80" r="1.2" fill="#1a7a56"/>
    <circle cx="80" cy="80" r="1.2" fill="#1a7a56"/>
    <circle cx="40" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="80" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="120" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="40" cy="160" r="1.2" fill="#1a7a56"/>
    <circle cx="600" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="640" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="680" cy="40" r="1.2" fill="#1a7a56"/>
    <circle cx="640" cy="80" r="1.2" fill="#1a7a56"/>
    <circle cx="680" cy="80" r="1.2" fill="#1a7a56"/>
    <circle cx="680" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="640" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="600" cy="120" r="1.2" fill="#1a7a56"/>
    <circle cx="680" cy="160" r="1.2" fill="#1a7a56"/>
    <circle cx="640" cy="160" r="1.2" fill="#1a7a56"/>
  </g>

  <!-- Seedling icon -->
  <g transform="translate(195, 52)">
    <!-- Stem -->
    <path d="M32 92 C32 72 32 60 32 48" stroke="url(#seedGradL)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Left leaf -->
    <path d="M32 62 C22 52 10 50 6 42 C4 36 8 28 18 30 C26 32 30 44 32 54" fill="#1a7a56" opacity="0.75"/>
    <!-- Right leaf -->
    <path d="M32 48 C42 38 54 36 58 28 C60 22 56 14 46 16 C38 18 34 30 32 40" fill="#2d9e73" opacity="0.85"/>
    <!-- Seed base -->
    <ellipse cx="32" cy="94" rx="10" ry="5" fill="#1a7a56" opacity="0.25"/>
  </g>
  
  <!-- "goseed" text -->
  <text x="268" y="115" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="56" font-weight="700" letter-spacing="-1" fill="#24292f">
    go<tspan fill="url(#seedGradL)">seed</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="270" y="145" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="14" fill="#6b7280" letter-spacing="0.5">
    scaffold Go projects with a clean foundation
  </text>
</svg>
